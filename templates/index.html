<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommender</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins', sans-serif;
            background:#0f0f0f;
            color:white;
            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background-image:
            linear-gradient(rgba(0,0,0,0.8),
            rgba(0,0,0,0.9)),
            url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba');

            background-size:cover;
            background-position:center;
        }

        .container{

            width:90%;
            max-width:700px;

            background:rgba(20,20,20,0.85);

            padding:40px;

            border-radius:20px;

            box-shadow:0 0 25px rgba(255,0,0,0.3);

            backdrop-filter:blur(10px);

            text-align:center;
        }

        h1{

            font-size:42px;

            margin-bottom:10px;

            color:#ff4b2b;
        }

        p{

            color:#cccccc;

            margin-bottom:30px;
        }

        select{

            width:100%;

            padding:15px;

            border:none;

            border-radius:10px;

            margin-bottom:20px;

            font-size:16px;

            background:#222;

            color:white;
        }

        button{

            padding:15px 30px;

            border:none;

            border-radius:10px;

            background:#ff416c;

            background:linear-gradient(
                to right,
                #ff4b2b,
                #ff416c
            );

            color:white;

            font-size:16px;

            cursor:pointer;

            transition:0.3s;
        }

        button:hover{

            transform:scale(1.05);

            box-shadow:0 0 15px #ff416c;
        }

        .recommendations{

            margin-top:40px;

            display:grid;

            grid-template-columns:1fr 1fr;

            gap:20px;
        }

        .movie-card{

            background:#1e1e1e;

            padding:20px;

            border-radius:15px;

            transition:0.3s;

            border:1px solid #333;
        }

        .movie-card:hover{

            transform:translateY(-5px);

            border-color:#ff416c;

            box-shadow:0 0 15px rgba(255,65,108,0.5);
        }

        .movie-card h3{

            color:#ffffff;

            font-size:18px;
        }

        @media(max-width:600px){

            .recommendations{

                grid-template-columns:1fr;
            }

            h1{

                font-size:30px;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Movie Recommender</h1>

    <p>
        Discover movies similar to your favorites
    </p>

    <form action="/recommend" method="POST">

        <select name="movie">

            {% for movie in movie_list %}

            <option value="{{ movie }}">
                {{ movie }}
            </option>

            {% endfor %}

        </select>

        <button type="submit">
            Recommend Movies
        </button>

    </form>

    {% if recommendations %}

    <div class="recommendations">

        {% for movie in recommendations %}

        <div class="movie-card">

            <h3>{{ movie }}</h3>

        </div>

        {% endfor %}

    </div>

    {% endif %}

</div>

</body>
</html>
